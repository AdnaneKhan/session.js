# Builds the MkDocs Material site in docs-site/ and deploys it to GitHub
# Pages at https://adnanekhan.github.io/session.js/.
#
# Triggers on pushes to main that touch docs-site/ (or this workflow), and
# manually via workflow_dispatch. Upstream doc updates land through
# `git subtree pull --prefix=docs-site docs-upstream main --squash`, which
# also triggers this workflow.

name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt
      - uses: actions/configure-pages@v5
      - name: Install MkDocs + Material theme
        run: pip install -r docs-site/requirements.txt
      - name: Build site
        run: mkdocs build --site-dir ../_site
        working-directory: docs-site
      - uses: actions/upload-pages-artifact@v3
        # default artifact path is _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
