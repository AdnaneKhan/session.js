site_name: Session.js Docs
site_url: https://adnanekhan.github.io/session.js/
repo_url: https://github.com/AdnaneKhan/session.js
repo_name: AdnaneKhan/session.js
theme:
  name: material
  logo: assets/logo.jpeg
  palette:
    - scheme: default
      primary: green
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate
      primary: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
copyright: Created by Viktor Shchelochkov aka <a href="https://hloth.dev" target="_blank" rel="noreferrer">hloth.dev</a> · Fork maintained by <a href="https://github.com/AdnaneKhan" target="_blank" rel="noreferrer">AdnaneKhan</a>
extra:
  social:
    - icon: material/pencil
      link: https://github.com/AdnaneKhan/session.js/tree/main/docs-site
      name: Edit documentation on GitHub
    - icon: fontawesome/brands/github
      link: https://github.com/AdnaneKhan/session.js
      name: Session.js fork on GitHub
    - icon: fontawesome/brands/telegram
      link: https://t.me/sessionjs
      name: Session.js and other stuff Telegram channel
markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
# Upstream also runs mkdocs-simple-hooks here, copying a Google
# site-verification file for sessionjs.github.io — dropped in this fork
# (verification belongs to the upstream domain, not this deployment).
plugins:
  - search
extra_css:
  - css/custom.css
nav:
  - Home: 
    - Home: index.md
    - Getting started: getting-started.md
  - Documentation:
    - Sending messages: sending.md
    - Polling messages: polling.md
    - Events: events.md
    - Storage:
      - storage/index.md
      - In-memory: storage/in-memory.md
      - File-based persistant: storage/file-keyval.md
    - Network:
      - network/index.md
      - Bun local: network/bun-local.md
      - Bun remote: network/bun-remote.md
      - Node.js (fork): network/node.md
    - Files and attachments: files-and-attachments.md
    - Reactions: reactions.md
    - Deleting messages: deleting-messages.md
    - Set name and avatar: profile.md
    - Mark message as read: mark-as-read.md
    - Show or hide typing indicator: typing-indicator.md
    - Accept conversation request: accept-conversation-request.md
    - Send "screenshot taken" message: screenshot-taken-notification.md
    - Send "media saved" message: media-saved-notification.md
    - SOGS: sogs.md
    - Error handling: error-handling.md
    - Constants: constants.md
  - Voice calls:
    - Overview: voice/index.md
    - Setup & install: voice/setup.md
    - Making calls: voice/making-calls.md
    - Receiving calls: voice/receiving-calls.md
    - Audio pipelines (STT/TTS): voice/audio-pipeline.md
    - API reference: voice/api-reference.md
    - Protocol & caveats: voice/protocol.md
    - Examples: voice/examples.md
  - How Session Works:
    - Accounts in Session: principles/users.md
    - Messages in Session: principles/messages.md
    - Files in Session: principles/files.md
  - Utilities:
    - Mnemonic: mnemonic.md
    - Oxen Name System (ONS): ons.md